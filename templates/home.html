{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href={% static 'css/style.css' %}
</head>
<body>
    <img src={% static 'images/monk.webp' %} alt="" width = 200>
    <div class = "container pt-5">
        <h2>patient table </h2>
        <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">designation</th>
      <th scope="col">email</th>
    </tr>
  </thead>
  <tbody>
    {% for i in patients %}
    <tr>
      <!-- <th scope="row">{{i.id}}</th>// this is give original id of the patient in database -->
      <th scope="row">{{ forloop.counter }}</th>
      <!-- // this is give the number of patient in the table -->
      <td ><a href="{% url 'patient_detail' i.id %}">{{ i.first_name }} {{ i.last_name}}</a></td>
      <td>{{ i.designation }}</td>
      <td>{{ i.email_adress}}</td>
      
    </tr>
    {% endfor %}
    <tr>
      <th scope="row">2</th>
      <td>Jacob</td>
      <td>Thornton</td>
      <td>@fat</td>
    </tr>
    <tr>
      <th scope="row">3</th>
      <td>John</td>
      <td>Doe</td>
      <td>@social</td>
    </tr>
  </tbody>
</table>
    </div>
    <!-- {% for i in patients %}
      <h1>{{ i }}</h1>
    {% endfor %} -->
    
    {% for i in patients %}
     <h1>{{i}}</h1>
    {% endfor %}

    


</body>
</html>
